<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#161b24;--bg3:#1e2535;--bg4:#252d40;--amber:#e8a020;--amber2:#f5c842;--blue:#3a7bd5;--blue2:#5a9bf0;--green:#2ecc71;--red:#e74c3c;--text:#e8eaf0;--text2:#9aa5b8;--text3:#6b7a94;--border:#2a3347;--border2:#3a4a66;--radius:8px;--radius2:12px;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{min-height:600px;max-width:820px;margin:0 auto;padding:16px 12px}
.btn{padding:10px 20px;border-radius:var(--radius);border:1.5px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;font-family:inherit}
.btn:hover{background:var(--amber);color:#000}
.btn-primary{background:var(--amber);color:#000;border-color:var(--amber)}
.btn-primary:hover{background:var(--amber2)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-danger{border-color:var(--red);color:var(--red)}.btn-danger:hover{background:var(--red);color:#fff}
.btn-green{border-color:var(--green);color:var(--green)}.btn-green:hover{background:var(--green);color:#000}
.btn-blue{border-color:var(--blue2);color:var(--blue2)}.btn-blue:hover{background:var(--blue2);color:#fff}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-amber{background:#3a2800;color:var(--amber);border:1px solid var(--amber)}
.badge-green{background:#0a2e1a;color:var(--green);border:1px solid var(--green)}
.badge-red{background:#2e0a0a;color:var(--red);border:1px solid var(--red)}
.badge-blue{background:#0a1e3a;color:var(--blue2);border:1px solid var(--blue2)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.tag{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sep{height:1px;background:var(--border);margin:16px 0}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:var(--amber);border-radius:2px;transition:width .4s}
.flex{display:flex;align-items:center;gap:10px}.flex-between{display:flex;align-items:center;justify-content:space-between}
h1{font-size:22px;font-weight:500;color:var(--amber2)}h2{font-size:18px;font-weight:500}
h3{font-size:15px;font-weight:500;color:var(--amber)}
p{font-size:14px;line-height:1.7;color:var(--text2)}ul{padding-left:18px}li{font-size:14px;line-height:1.8;color:var(--text2)}
.warn-box{background:#1e1500;border:1px solid #5a3800;border-left:3px solid var(--amber);border-radius:var(--radius);padding:12px 14px;margin:10px 0}
.warn-box p{font-size:13px;color:#d4a030}
.info-box{background:#0a1e35;border:1px solid #1e3a5a;border-left:3px solid var(--blue2);border-radius:var(--radius);padding:12px 14px;margin:10px 0}
.info-box p{font-size:13px;color:#7ab8f5}
.danger-box{background:#1e0a0a;border:1px solid #5a1a1a;border-left:3px solid var(--red);border-radius:var(--radius);padding:12px 14px;margin:10px 0}
.danger-box p{font-size:13px;color:#f07070}
.data-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border)}
.data-row:last-child{border-bottom:none}
.data-label{font-size:13px;color:var(--text2)}.data-value{font-size:13px;font-weight:500;color:var(--amber2);text-align:right;max-width:60%}
.chapter-title{font-size:14px;font-weight:500;color:var(--blue2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.opt{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .2s;font-size:14px;color:var(--text2);margin-bottom:8px;text-align:left;width:100%;font-family:inherit}
.opt:hover{border-color:var(--amber);color:var(--text)}.opt.selected{border-color:var(--amber);background:#2a1e00;color:var(--amber2)}
.opt.correct{border-color:var(--green);background:#0a2010;color:var(--green)}.opt.incorrect{border-color:var(--red);background:#2a0a0a;color:var(--red)}
.ep-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:var(--text3);transition:all .2s}
.ep-dot.answered{border-color:var(--blue2);background:#0a1e3a;color:var(--blue2)}.ep-dot.current{border-color:var(--amber);background:#2a1e00;color:var(--amber);font-weight:600}
.ep-dot.correct{border-color:var(--green);background:#0a2010;color:var(--green)}.ep-dot.incorrect{border-color:var(--red);background:#2a0a0a;color:var(--red)}
.module-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.module-card:hover{border-color:var(--border2);background:var(--bg3)}.module-card.locked{opacity:.5;cursor:not-allowed}
.module-card.completed{border-color:#1e4a2a}.module-card.active{border-color:var(--amber)}
.scroll-area{max-height:420px;overflow-y:auto;padding-right:4px}
.scroll-area::-webkit-scrollbar{width:4px}.scroll-area::-webkit-scrollbar-track{background:var(--bg)}.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.fig-img{width:100%;border:1px solid var(--border);border-radius:var(--radius);margin:14px 0;background:#fff;display:block}
.fig-caption{text-align:center;font-size:12px;color:var(--text3);margin:-10px 0 14px;font-style:italic}
input[type=text],input[type=email],input[type=password]{background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:14px;width:100%;margin-bottom:12px;font-family:inherit}
input:focus{outline:none;border-color:var(--amber)}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:28px;width:min(480px,95vw);max-height:85vh;overflow-y:auto}
.admin-link{position:fixed;bottom:16px;right:16px;font-size:18px;cursor:pointer;opacity:.2;transition:opacity .2s;background:none;border:none;color:var(--text3)}
.admin-link:hover{opacity:.7}

/* DAY MODE */
body.day{--bg:#eef1f5;--bg2:#fff;--bg3:#e4e8ef;--bg4:#d6dbe6;
  --amber:#8a6000;--amber2:#6e4c00;--blue:#1565c0;--blue2:#0d47a1;
  --green:#1b5e20;--red:#b71c1c;
  --text:#1a1a2e;--text2:#2c3450;--text3:#5a6478;
  --border:#bec8d8;--border2:#8a96aa;}
body,.card,input{transition:background .25s,color .25s,border-color .25s}
.metric{color:var(--blue2);font-size:.88em;font-style:italic}
body.day .metric{color:var(--blue)}
#theme-btn{position:fixed;top:13px;right:13px;z-index:999;width:38px;height:38px;
  border-radius:50%;border:1.5px solid var(--border2);background:var(--bg3);
  cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.25);color:var(--text);transition:transform .15s}
#theme-btn:hover{transform:scale(1.12);border-color:var(--amber)}
</style>

// ========= EMAIL CONFIG =========
const EMAIL_CFG = {

try{ emailjs.init({publicKey: EMAIL_CFG.publicKey}); }catch(e){}

// ========= COURSE DATA =========
const MODULES = [
{id:1,title:"Descripción General y Tripulación",subtitle:"Secciones 1 y 2 — Airframe, rotores, compartimientos",icon:"✈",
chapters:[
{title:"1.1 — El JetRanger III: Descripción General",
content:`<p>El <strong style="color:var(--amber2)">Bell Model 206B JetRanger III</strong> es un helicóptero utilitario de motor sencillo diseñado para despegar y aterrizar en cualquier terreno razonablemente nivelado. La configuración estándar es para un piloto y cuatro pasajeros.</p>
<img src="${IMGS.heli_overview}" class="fig-img" alt="Helicóptero JetRanger III">
<p class="fig-caption">Figura 1-1. Helicóptero JetRanger III — Secciones del fuselaje</p>
<div class="info-box"><p>Esta publicación es exclusivamente para capacitación en el Bell Model 206B-3. Para procedimientos y limitaciones actualizados, consultar los Manuales de Vuelo vigentes (BHT-206B-FM-1).</p></div>
<div class="chapter-title" style="margin-top:12px">Datos Técnicos Principales</div>
<div class="data-row"><span class="data-label">Motor</span><span class="data-value">Allison 250-C20J (Rolls Royce)</span></div>
<div class="data-row"><span class="data-label">Potencia nominal</span><span class="data-value">420 SHP <span class='metric'>(313 kW)</span></span></div>
<div class="data-row"><span class="data-label">Potencia despegue (limitada)</span><span class="data-value">317 SHP <span class='metric'>(236 kW)</span> — 5 min</span></div>
<div class="data-row"><span class="data-label">Potencia continua (limitada)</span><span class="data-value">270 SHP <span class='metric'>(201 kW)</span></span></div>
<div class="data-row"><span class="data-label">Peso vacío promedio</span><span class="data-value">1,604 libras</span></div>
<div class="data-row"><span class="data-label">Peso bruto máximo (interno)</span><span class="data-value">3,200 libras</span></div>
<div class="data-row"><span class="data-label">Peso bruto máximo (externo)</span><span class="data-value">3,350 libras</span></div>
<img src="${IMGS.data_table}" class="fig-img" alt="Información General 206B-III">
<p class="fig-caption">Información General 206B-III — Velocidades, altitudes y pesos</p>`},
{title:"1.2 — Rotor Principal y de Cola",
content:`<div class="chapter-title">Rotor Principal</div>
<p>El rotor principal es <strong style="color:var(--amber2)">semi-rígido de subibaja (seesaw/underslung)</strong>, con el eje de cambio de paso por debajo del eje de aleteo. Tiene <strong style="color:var(--amber2)">dos palas de metal intercambiables individualmente</strong>. Cada pala unida al cubo por horquilla, cojinetes de cambio de paso y barra de tensión-torsión.</p>
<div class="data-row"><span class="data-label">Número de palas</span><span class="data-value">2</span></div>
<div class="data-row"><span class="data-label">Diámetro</span><span class="data-value">33 pies 4" <span class='metric'>(10,16 m)</span></span></div>
<div class="data-row"><span class="data-label">Cuerda</span><span class="data-value">13 pulgadas</span></div>
<div class="data-row"><span class="data-label">Torcimiento</span><span class="data-value">-10 grados</span></div>
<div class="data-row"><span class="data-label">Proporción motor/rotor</span><span class="data-value">15.23 a 1</span></div>
<div class="data-row"><span class="data-label">RPM a 100%</span><span class="data-value">395</span></div>
<div class="chapter-title" style="margin-top:12px">Rotor de Cola</div>
<div class="data-row"><span class="data-label">Número de palas</span><span class="data-value">2 — semi-rígido subibaja</span></div>
<div class="data-row"><span class="data-label">Diámetro</span><span class="data-value">5 pies 5" <span class='metric'>(1,65 m)</span></span></div>
<div class="data-row"><span class="data-label">RPM a 100%</span><span class="data-value">2,560</span></div>
<div class="warn-box"><p>Las RPM del rotor de cola no son indicadas directamente al piloto. Se controlan a través del régimen del motor N2.</p></div>`},
{title:"1.3 — Fuselaje y Dimensiones",
content:`<p>El fuselaje se divide en tres secciones:</p>
<div class="data-row"><span class="data-label">Sección Delantera</span><span class="data-value">Honeycomb aluminio — máx. resistencia y bajo ruido</span></div>
<div class="data-row"><span class="data-label">Sección Intermedia</span><span class="data-value">Semimonocasco — plataforma motor + carga + equipo</span></div>
<div class="data-row"><span class="data-label">Cono de Cola</span><span class="data-value">Monocasco — soporta eje, rotor cola, estabilizadores</span></div>
<img src="${IMGS.dimensions}" class="fig-img" alt="Dimensiones Principales 206B">
<p class="fig-caption">Figura 1-3. Dimensiones Principales del Bell 206B JetRanger III</p>
<div class="data-row"><span class="data-label">Largo total fuselaje</span><span class="data-value">39 pies 1" <span class='metric'>(11,91 m)</span></span></div>
<div class="data-row"><span class="data-label">Altura total</span><span class="data-value">9 pies 7.5" <span class='metric'>(2,94 m)</span></span></div>
<div class="data-row"><span class="data-label">Separación patines (3,200 lb)</span><span class="data-value">6 pies 3.5" <span class='metric'>(1,92 m)</span></span></div>
<div class="data-row"><span class="data-label">Compartimiento principal de carga</span><span class="data-value">40 ft³ <span class='metric'>(1,13 m³)</span></span></div>
<div class="data-row"><span class="data-label">Compartimiento de equipaje</span><span class="data-value">16 ft³ <span class='metric'>(0,45 m³)</span> — máx. 250 libras</span></div>`},
{title:"1.4 — Compartimiento de Tripulación y Estabilizadores",
content:`<div class="chapter-title">Compartimiento de Tripulación</div>
<p>La sección delantera tiene aproximadamente <strong style="color:var(--amber2)">40 ft³ <span class='metric'>(1,13 m³)</span></strong> para acomodar pasajeros o carga. Las puertas traseras pueden quitarse para llevar objetos largos. Hay 16 ft³ <span class='metric'>(0,45 m³)</span> adicionales en la sección intermedia donde se pueden llevar 250 libras de equipaje.</p>
<div class="chapter-title" style="margin-top:12px">Estabilizadores</div>
<p><strong style="color:var(--amber2)">Estabilizador horizontal:</strong> Construido de aluminio, unido al cono de cola. Mantiene actitud casi nivelada a cualquier velocidad.</p>
<p style="margin-top:8px"><strong style="color:var(--amber2)">Estabilizador vertical:</strong> La orilla de ataque está desviada <strong>5.5°</strong> hacia el exterior para reducir el empuje del rotor de cola en vuelos de avance, mejorando la habilidad de aterrizajes por pérdida de pedal. Es de núcleo de panal de abeja de aluminio y piel de aluminio.</p>
<div class="info-box"><p>El combustible y pasajeros se ubican <strong>debajo del rotor principal</strong> para minimizar los cambios en el centro de gravedad durante el consumo de combustible.</p></div>`}
],
quiz:[
{q:"¿Cuál es la configuración estándar del Bell 206B JetRanger III?",opts:["2 pilotos y 3 pasajeros","1 piloto y 4 pasajeros","2 pilotos y 4 pasajeros","1 piloto y 3 pasajeros"],ans:1},
{q:"¿Qué tipo de rotor principal tiene el JetRanger III?",opts:["Articulado, de 4 palas","Rígido, de 2 palas","Semi-rígido de subibaja (seesaw), de 2 palas","Semi-rígido articulado, de 3 palas"],ans:2},
{q:"¿Dónde se ubica el tanque de combustible para minimizar cambios en el CG?",opts:["Arriba del motor","En el morro del helicóptero","Debajo y detrás del asiento del pasajero","En el cono de cola"],ans:2},
{q:"¿Cuál es la capacidad máxima del compartimiento de equipaje en la sección intermedia?",opts:["40 ft³ <span class='metric'>(1,13 m³)</span> / sin límite de peso","500 libras — 16 ft³ <span class='metric'>(0,45 m³)</span>","250 libras — 16 ft³ <span class='metric'>(0,45 m³)</span>","350 libras — 25 pies cúbicos"],ans:2},
{q:"¿Cuántos grados está desviada la orilla de ataque del estabilizador vertical hacia el exterior?",opts:["3°","10°","5.5°","7°"],ans:2}
]},
{id:2,title:"Limitaciones de Operación",subtitle:"Sección 3 — Velocidades, altitudes, tipo de vuelo",icon:"⚠",
chapters:[
{title:"2.1 — Tipo de Operación y Tripulación",
content:`<p>El helicóptero básico está aprobado para <strong style="color:var(--amber2)">5 pasajeros</strong> y certificado para operaciones <strong style="color:var(--amber2)">diurnas y nocturnas VFR cuando no hay hielo</strong>.</p>
<div class="chapter-title">Panel de Instrumentos</div>
<img src="${IMGS.instrument_panel}" class="fig-img" alt="Panel de instrumentos">
<p class="fig-caption">Figura 2-1. Panel de instrumentos estándar — The Standard JetRanger instrument panel and radio pedestal</p>
<div class="chapter-title" style="margin-top:12px">Tripulación de Vuelo</div>
<p>La tripulación mínima consiste de <strong style="color:var(--amber2)">un piloto, sentado en el asiento de la derecha</strong>. El asiento de la izquierda puede ser para un piloto adicional solo cuando están instalados los controles dobles aprobados.</p>
<div class="warn-box"><p>Las operaciones nocturnas se limitan a condiciones de contacto visual. La orientación debe mantenerse por referencia visual con objetos en tierra, por luces terrestres o adecuada iluminación celeste.</p></div>`},
{title:"2.2 — Sistema Pitot/Estático",
content:`<p>El tubo pitot está montado en la parte más delantera de la nariz de la cabina, al lado derecho de la línea central del helicóptero. La presión del aire estático se obtiene de dos ventilas estáticas localizadas en los paneles izquierdo y derecho abajo de la ventana inferior de la cabina.</p>
<img src="${IMGS.pitot_static}" class="fig-img" alt="Sistema Pitot/Estático">
<p class="fig-caption">Figura 2-2. Sistema Pitot/Estático</p>
<div class="chapter-title" style="margin-top:12px">Instrumentos de Propulsión</div>
<ul>
<li>Indicador tacómetro doble del rotor y N2</li>
<li>Indicador temperatura/presión aceite del motor</li>
<li>Indicador tacómetro productora de gas N1</li>
<li>Indicador presión/temp. aceite de transmisión</li>
<li>Indicador de presión de combustible</li>
<li>Torquímetro del motor</li>
<li>Indicador de cantidad de combustible</li>
<li>Indicador TOT (Temperatura de salida de turbina)</li>
</ul>`},
{title:"2.3 — Limitaciones de Velocidad (VNE) y Altitud",
content:`<div class="chapter-title">Peso bruto 3,000 lb o menos</div>
<div class="data-row"><span class="data-label">VNE nivel del mar a 3,000 ft densidad</span><span class="data-value">150 MPH <span class='metric'>(241 km/h)</span> IAS (130 KIAS)</span></div>
<div class="data-row"><span class="data-label">Reducción c/1,000 ft sobre 3,000 ft dens.</span><span class="data-value">4.0 MPH (3.5 KIAS)</span></div>
<div class="data-row"><span class="data-label">Altitud máxima</span><span class="data-value">20,000 pies <span class='metric'>(6.096 m)</span> <span class='metric'>(6.096 m)</span> presión altitud</span></div>
<div class="chapter-title" style="margin-top:12px">Peso bruto por encima de 3,000 lb</div>
<div class="data-row"><span class="data-label">VNE nivel del mar a 3,000 ft densidad</span><span class="data-value">140 MPH <span class='metric'>(225 km/h)</span> IAS (122 nudos)</span></div>
<div class="data-row"><span class="data-label">Reducción c/1,000 ft sobre 3,000 ft dens.</span><span class="data-value">8.0 MPH (7.0 nudos)</span></div>
<div class="data-row"><span class="data-label">Altitud máxima</span><span class="data-value">13,500 pies <span class='metric'>(4.115 m)</span> <span class='metric'>(4.115 m)</span> densidad altitud</span></div>
<div class="chapter-title" style="margin-top:12px">Otras Velocidades Limitantes</div>
<div class="data-row"><span class="data-label">Velocidad máxima para autorrotación estable</span><span class="data-value">115 MPH <span class='metric'>(185 km/h)</span> (100 nudos)</span></div>
<div class="data-row"><span class="data-label">Velocidad máxima con puertas traseras quitadas</span><span class="data-value">87 nudos (100 mph)</span></div>
<div class="data-row"><span class="data-label">Velocidad máxima con puertas delanteras quitadas</span><span class="data-value">69 nudos (80 mph)</span></div>
<div class="warn-box"><p>Se prohíbe usar intencionalmente los límites transitorios. Encender la luz anticolisión al volar cerca de o en humedad visible para evitar reflejos y vértigo.</p></div>`},
{title:"2.4 — Limitaciones CG, Motor y Condiciones Especiales",
content:`<img src="${IMGS.limitations}" class="fig-img" alt="Limitaciones de CG y Motor">
<p class="fig-caption">Limitaciones del Centro de Gravedad y Planta de Potencia</p>
<div class="chapter-title">Límites del CG Lateral</div>
<div class="data-row"><span class="data-label">Límite izquierdo (-)</span><span class="data-value">3.0 pulgadas (76.2 mm) de línea central</span></div>
<div class="data-row"><span class="data-label">Límite derecho (+)</span><span class="data-value">4.0 pulgadas (101.6 mm) de línea central</span></div>
<div class="chapter-title" style="margin-top:12px">Turbina de Potencia N2 — Límites RPM en Operación</div>

{id:3,title:"Planta de Potencia y Combustible",subtitle:"Secciones 5 y 6 — Motor Allison 250-C20J, sistema de combustible",icon:"⚙",
chapters:[
{title:"3.1 — Motor Allison 250-C20J: Descripción y Componentes",
content:`<p>El JetRanger III está equipado con el motor turboeje <strong style="color:var(--amber2)">Allison 250-C20J</strong>, fabricado por Allison Engine Company, División de Rolls Royce. El motor tiene una capacidad de <strong style="color:var(--amber2)">420 SHP <span class='metric'>(313 kW)</span></strong>, limitado para la operación.</p>
<div class="chapter-title">Componentes accionados por N1 (productora de gas):</div>
<ul>
<li>Generador tacómetro de la productora de gas</li>
<li>Conjunto de la bomba de combustible</li>
<li>Generador/Arrancador</li>
<li>Control de combustible de la productora de gas N1</li>
<li>Conjunto de la bomba de aceite</li>
</ul>
<img src="${IMGS.engine_gear}" class="fig-img" alt="N2 Tren de engranajes de turbina de potencia">
<p class="fig-caption">Figura 5-4. N2 Tren de engranajes de turbina de potencia</p>
<div class="info-box"><p>El tren N2 da una reducción en la velocidad de N2 de 33,290 RPM en el rotor de la turbina de potencia a 6,016 RPM de salida a la unidad de rueda libre.</p></div>`},
{title:"3.2 — Limitaciones del Motor",
content:`<div class="chapter-title">Límites TOT (Temperatura de Salida de Turbina)</div>
<div class="data-row"><span class="data-label">TOT máximo DESPEGUE (5 min)</span><span class="data-value" style="color:var(--red)">810°C</span></div>
<div class="data-row"><span class="data-label">TOT máximo CONTINUO</span><span class="data-value">738°C</span></div>
<div class="data-row"><span class="data-label">TOT máximo TRANSITORIO (5 seg)</span><span class="data-value">927°C</span></div>
<div class="chapter-title" style="margin-top:12px">Límites RPM y Torque</div>
<div class="data-row"><span class="data-label">N1 máximo</span><span class="data-value">105%</span></div>
<div class="data-row"><span class="data-label">Torque máximo despegue</span><span class="data-value">100% (5 minutos)</span></div>
<div class="data-row"><span class="data-label">Torque máximo transitorio</span><span class="data-value">110% (5 segundos)</span></div>
<div class="data-row"><span class="data-label">Potencia máxima continua (85% torque)</span><span class="data-value">270 SHP <span class='metric'>(201 kW)</span></span></div>
<div class="danger-box"><p>NUNCA exceder los límites del motor. El TOT por encima del máximo continuo puede dañar irreparablemente los álabes de la turbina.</p></div>
<div class="warn-box"><p>Días fríos → torque será el factor limitante. Días cálidos/grandes alturas → TOT será el factor limitante.</p></div>`},
{title:"3.3 — Sistema de Combustible",
content:`<img src="${IMGS.fuel_system}" class="fig-img" alt="Sección 6 — Sistema de Combustible">
<p class="fig-caption">Sistema de Combustible — Sección 6: celda vejiga debajo y detrás del asiento de pasajero</p>
<div class="data-row"><span class="data-label">Capacidad total tanque (S/N 3567+)</span><span class="data-value">91 gal <span class='metric'>(344 L)</span></span></div>
<div class="data-row"><span class="data-label">Capacidad usable</span><span class="data-value">76 gal <span class='metric'>(288 L)</span></span></div>
<div class="data-row"><span class="data-label">Tipo de tanque</span><span class="data-value">Vejiga, resistente a impactos</span></div>
<div class="data-row"><span class="data-label">Llenado</span><span class="data-value">Desde el lado derecho</span></div>
<div class="data-row"><span class="data-label">Bombas reforzadoras</span><span class="data-value">2 bombas eléctricas en el fondo de la celda</span></div>
<div class="chapter-title" style="margin-top:12px">Combustibles Aprobados</div>
<div class="data-row"><span class="data-label">Principal</span><span class="data-value">ASTM Tipo Jet B (JP-4) — cualquier temperatura</span></div>
<div class="data-row"><span class="data-label">Alternativo &gt; 0°F (-17.8°C)</span><span class="data-value">ASTM Tipo Jet A o A-1 (JP-5 o JP-8)</span></div>
<div class="data-row"><span class="data-label">Alternativo &lt; 0°F (-17.8°C)</span><span class="data-value">Mezcla 80/87 AVGAS y Tipo Jet A y A-1</span></div>`},
{title:"3.4 — Procedimiento de Drenaje de Combustible",
content:`<p>Antes del primer vuelo del día se debe drenar y revisar la muestra de combustible del sumidero de la celda y del filtro del fuselaje.</p>
<div class="data-row"><span class="data-label">Paso 1</span><span class="data-value">Rompe-circuitos FUEL BOOST AFT y FWD — Fuera</span></div>
<div class="data-row"><span class="data-label">Paso 2</span><span class="data-value">Interruptor BAT — ON</span></div>
<div class="data-row"><span class="data-label">Paso 3</span><span class="data-value">Interruptor FUEL VALVE — OFF</span></div>
<div class="data-row"><span class="data-label">Paso 4</span><span class="data-value">Botón drenaje de combustible — Oprimir, tomar muestra, soltar</span></div>
<div class="chapter-title" style="margin-top:12px">Filtro de Combustible del Fuselaje</div>
<div class="data-row"><span class="data-label">Paso 1</span><span class="data-value">Interruptor FUEL VALVE — ON</span></div>
<div class="data-row"><span class="data-label">Paso 2</span><span class="data-value">Rompe-circuitos FUEL BOOST AFT y FWD — Adentro</span></div>
<div class="data-row"><span class="data-label">Paso 3</span><span class="data-value">Rompe circuito CAUTION LT — Adentro</span></div>
<div class="data-row"><span class="data-label">Paso 4</span><span class="data-value">Válvula de drenaje del filtro — Abrir, obtener muestra, cerrar</span></div>
<div class="warn-box"><p>No arrancar el motor si la muestra de combustible tiene agua, sedimentos o contaminación. Consultar a mantenimiento antes de proceder.</p></div>`}
],

{id:4,title:"Fuselaje, Transmisión y Sistemas",subtitle:"Secciones 4, 7, 8, 9, 10, 11 — Estructura, hidráulico, eléctrico",icon:"🔧",
chapters:[
{title:"4.1 — Transmisión y Tren Impulsor",
content:`<p>El sistema de transmisión transmite la potencia del motor al rotor principal y de cola. El eje impulsor principal conecta la salida del motor con la caja de engranajes de la transmisión principal.</p>
<img src="${IMGS.transmission}" class="fig-img" alt="Transmisión y tren impulsor">
<p class="fig-caption">Transmisión y tren impulsor — inspección de componentes críticos</p>
<div class="chapter-title">Puntos Críticos de Inspección en Preflight</div>
<div class="data-row"><span class="data-label">Pasador de arrastre</span><span class="data-value">Seguridad y evidencia de contacto con placa tape estático</span></div>
<div class="data-row"><span class="data-label">Acople delantero eje impulsor</span><span class="data-value">Condición y fugas de grasa — tiras café = calor excesivo</span></div>
<div class="data-row"><span class="data-label">Transmisión — aceite</span><span class="data-value">Nivel y fugas en el área</span></div>
<div class="data-row"><span class="data-label">Montaje aislante</span><span class="data-value">Condición</span></div>
<div class="warn-box"><p>Las tiras indicadoras de calentamiento excesivo de color café en el acople delantero del eje impulsor principal indican posible falla grave. Reportar inmediatamente a mantenimiento, no realizar el vuelo.</p></div>`},
{title:"4.2 — Fuselaje: Sección Intermedia y Cono de Cola",
content:`<p>La <strong style="color:var(--amber2)">sección intermedia</strong> es semimonocasco con plataforma del motor, compartimiento equipaje y compartimiento equipo. Cubierta por pieles de aleación de aluminio y carenaje de fibra de vidrio en el extremo inferior trasero.</p>
<p style="margin-top:8px">Hay un <strong style="color:var(--amber2)">recipiente de titanio</strong> debajo del motor que sirve para recibir el goteo y como pared de fuego. Es curvo para permitir quitar accesorios sin remover el motor.</p>
<div class="chapter-title" style="margin-top:12px">Puerta de Carga</div>
<p>Tiene un <strong style="color:var(--amber2)">microswitch</strong> hacia la luz de aviso. Está a la izquierda del fuselaje con bisagras en el extremo delantero. Se abre a todo lo ancho y alto. Asegurada con dos cerraduras de botones y una cerradura con llave.</p>
<div class="chapter-title" style="margin-top:12px">Cono de Cola</div>
<p>Estructura monocasco. Soporta al <strong style="color:var(--amber2)">eje impulsor del rotor de cola, rotor de cola, caja de engranajes, estabilizador vertical y estabilizador horizontal</strong>.</p>
<div class="data-row"><span class="data-label">Cubierta caja engranajes rotor cola</span><span class="data-value">Aleación de aluminio</span></div>
<div class="data-row"><span class="data-label">Estabilizador horizontal</span><span class="data-value">Aluminio — costilla interior fija al cono de cola</span></div>`},
{title:"4.3 — Sistema Hidráulico",
content:`<p>El sistema hidráulico del JetRanger proporciona asistencia hidráulica a los <strong style="color:var(--amber2)">controles cíclico y colectivo</strong>, reduciendo el esfuerzo del piloto.</p>
<img src="${IMGS.hydraulic}" class="fig-img" alt="Verificación del sistema hidráulico">
<p class="fig-caption">Verificación preliminar del sistema hidráulico — procedimiento correcto</p>
<div class="chapter-title">Verificación Hidráulica en Corrida de Motor</div>
<div class="data-row"><span class="data-label">Acelerador</span><span class="data-value">Abierto a 70% RPM productora de gas</span></div>
<div class="data-row"><span class="data-label">Gobernador N2</span><span class="data-value">Verificar rango 97 a 100% RPM</span></div>
<div class="data-row"><span class="data-label">Interruptor HYD SYSTEM o CTRL BOOST</span><span class="data-value">OFF — luego ON</span></div>
<div class="info-box"><p>Si el control cíclico se mueve por sí mismo o motoriza con el sistema hidráulico apagado, ello puede indicar una falla del sistema hidráulico. Consultar a mantenimiento.</p></div>
<div class="chapter-title" style="margin-top:12px">Lubricante aprobado (sistema hidráulico)</div>
<div class="data-row"><span class="data-label">Especificación</span><span class="data-value">MIL-H-5606 — 1 pinta en depósito, 1 pinta en sistema</span></div>`},
{title:"4.4 — Sistema Eléctrico y Controles de Vuelo",
content:`<div class="chapter-title">Sistema Eléctrico</div>
<div class="data-row"><span class="data-label">Interruptor BAT</span><span class="data-value">Alimentación principal de batería</span></div>
<div class="data-row"><span class="data-label">Interruptor GEN</span><span class="data-value">Generador — carga normal 10-20%</span></div>
<div class="data-row"><span class="data-label">Carga máxima normal pre-despegue</span><span class="data-value">Por debajo del 70%</span></div>
<div class="data-row"><span class="data-label">Interruptor INST LT (reóstato)</span><span class="data-value">Iluminación de instrumentos</span></div>
<div class="chapter-title" style="margin-top:12px">Controles de Vuelo</div>
<div class="data-row"><span class="data-label">Cíclico</span><span class="data-value">Control de actitud y velocidad horizontal. Fricción ajustable.</span></div>
<div class="data-row"><span class="data-label">Colectivo</span><span class="data-value">Control de paso colectivo y potencia. Fricción ajustable.</span></div>
<div class="data-row"><span class="data-label">Pedales</span><span class="data-value">Control de paso del rotor de cola (guiñada)</span></div>
<div class="data-row"><span class="data-label">Acelerador</span><span class="data-value">En mango del colectivo, controla N2/RPM del motor</span></div>
<div class="info-box"><p>El torquímetro indica el porcentaje de torque del motor. Es el instrumento primario para verificación de potencia junto con el TOT e indicadores N1 y N2.</p></div>`}
],
quiz:[
{q:"¿Para qué sirve el recipiente de titanio ubicado debajo del motor?",opts:["Almacenar aceite extra de reserva","Recibir el goteo y actuar como pared de fuego","Soporte estructural del motor","Ventilación del compartimiento motor"],ans:1},
{q:"¿Qué tipo de estructura es el cono de cola del JetRanger III?",opts:["Semimonocasco","Monocasco","Estructura de panal de abeja","Largueros y costillas"],ans:1},
{q:"¿Qué indica una tira indicadora de color café en el acople delantero del eje impulsor?",opts:["Que el aceite debe cambiarse","Evidencia de calentamiento excesivo — no volar","Lubricación insuficiente reciente","Alineación incorrecta del eje"],ans:1},
{q:"¿Cuántos cojinetes y pernos conectan cada pala del rotor de cola al yugo común?",opts:["3 cojinetes y 2 pernos","2 cojinetes y 2 pernos","4 cojinetes y 4 pernos","1 cojinete y 4 pernos"],ans:1},

{id:5,title:"Rendimiento, Peso y Balance",subtitle:"Secciones 12 y 13 — Verificación de potencia, datos de desempeño",icon:"📊",
chapters:[
{title:"5.1 — Verificación de Potencia",
content:`<p>Los datos de rendimiento se aplican al motor <strong style="color:var(--amber2)">250-C20B/C20J</strong>. La gráfica indica el porcentaje mínimo de torque que debe haber disponible de un motor que cumple los requerimientos mínimos de Allison.</p>
<img src="${IMGS.power_check}" class="fig-img" alt="Power Check Chart">
<p class="fig-caption">Figura 12-1. Gráfica de Verificación de Potencia — Motor Allison 250-C20B/C20J</p>
<div class="chapter-title">Método preferido — ascenso a 60 MPH (52 nudos)</div>
<p>Se pueden hacer verificaciones de potencia exactas en un ascenso a <strong style="color:var(--amber2)">60 mph <span class='metric'>(97 km/h)</span> (52 nudos) IAS</strong> agregando <strong style="color:var(--amber2)">2% a la lectura de la gráfica de porcentaje de torque</strong>.</p>
<div class="warn-box"><p>Para verificación de potencia, asegurar que ENGINE DEICING/ANTI-ICING y el switch GEN estén OFF. Levantar colectivo hasta TOT estabilizado o alcanzar límite de torque. Anotar OAT, TOT, presión, altitud, torque y N1.</p></div>`},
{title:"5.2 — Régimen de Ascenso",
content:`<p>El <strong style="color:var(--amber2)">régimen de ascenso</strong> en la gráfica se denomina "TAPELINE RATE OF CLIMB". Mide el régimen real en un día estándar con gradiente vertical de temperatura estándar.</p>
<img src="${IMGS.rate_of_climb}" class="fig-img" alt="Rate of Climb Chart">
<p class="fig-caption">Figura 12-2. Rate of Climb — Máximo, potencia de despegue, Anti-ice OFF o ON (unidades inglesas)</p>
<div class="chapter-title">Corrección por Anti-Hielo</div>
<div class="data-row"><span class="data-label">Anti-Hielo OFF — R/C base</span><span class="data-value">Leer directamente de la gráfica</span></div>
<div class="data-row"><span class="data-label">Con Anti-Hielo ON (en el ejemplo)</span><span class="data-value">Disminuir ΔR/C = 240 ft/min</span></div>
<div class="data-row"><span class="data-label">Ejemplo: Anti-ice OFF 890 ft/min</span><span class="data-value">Anti-ice ON = 890 − 240 = 650 ft/min <span class='metric'>(198 m/min)</span></span></div>
<div class="data-row"><span class="data-label">Operación sin puertas</span><span class="data-value">Reducir datos base en 350 ft/min</span></div>
<div class="info-box"><p>Generador: 22.3 Amps. Condición: N2 = 100% RPM, V IND = 60 MPH (52 KIAS).</p></div>`},
{title:"5.3 — Techo de Vuelo Estacionario: IGE y OGE",
content:`<p>Las gráficas de Techo de Vuelo Estacionario muestran el desempeño en vuelo estacionario (peso bruto permitido) en condiciones de presión altitud y OAT. Se dividen en dos áreas:</p>
<ul>
<li><strong style="color:var(--amber2)">ÁREA A (blanca):</strong> Control demostrado con vientos de lado y de cola de hasta 20 mph (17 nudos)</li>
<li><strong style="color:var(--amber2)">ÁREA B (sombreada):</strong> Solo vientos calmados o fuera del Área Crítica de Viento Azimuth</li>
</ul>
<img src="${IMGS.wind_azimuth}" class="fig-img" alt="Critical Wind Azimuth">
<p class="fig-caption">Figura 12-3. Área crítica de viento relativo Azimuth</p>
<div class="danger-box"><p>El TOT del motor se incrementa notablemente en vuelo estacionario a favor del viento (downwind). Evitar este vuelo al operar cerca de los límites de TOT.</p></div>
<img src="${IMGS.hover_ige}" class="fig-img" alt="Hover Ceiling IGE">
<p class="fig-caption">Figura 12-4. Techo de vuelo estacionario con efecto en tierra (IGE) — Potencia de despegue, 0° a 46°C, Anti-ice OFF</p>
<img src="${IMGS.hover_oge}" class="fig-img" alt="Hover Ceiling OGE">
<p class="fig-caption">Figura 12-5. Techo de vuelo estacionario fuera del efecto en tierra (OGE) — Potencia de despegue, 0° a 46°C, Anti-ice OFF</p>
<div class="warn-box"><p>Con Anti-Hielo ON: IGE restar 220 lb (99.8 kg) — OGE restar 295 lb (133.8 kg) del peso bruto. Condiciones: Generador 22.3 A, altura de patines 2 ft (IGE) y 40 ft (OGE), N2 100%.</p></div>`},
{title:"5.4 — Diagrama Altura-Velocidad y Peso/Balance",
content:`<p>El <strong style="color:var(--amber2)">Diagrama Altura-Velocidad (H-V)</strong> define las condiciones desde las cuales se puede hacer un aterrizaje seguro en superficie plana, nivelada y firme después de una falla del motor. Es válido solo cuando el peso bruto no excede los límites de Altitud vs Peso Bruto.</p>
<img src="${IMGS.height_velocity}" class="fig-img" alt="Height-Velocity Diagram">
<p class="fig-caption">Figura 12-6. Diagrama Altura-Velocidad — Superficies lisas, niveladas y firmes</p>
<div class="danger-box"><p>EVITAR OPERAR EN EL ÁREA SOMBREADA. Las condiciones dentro del área sombreada no permiten garantizar un aterrizaje seguro después de una falla del motor.</p></div>
<div class="chapter-title" style="margin-top:12px">Peso y Balance — Ejemplo de Cálculo</div>
<img src="${IMGS.weight_balance}" class="fig-img" alt="Tabla Peso y Balance">
<p class="fig-caption">Sección 13. Tabla de Peso y Balance — Ejemplo de vuelo de salida y retorno (PESO / CG / MOMENTO)</p>
<div class="data-row"><span class="data-label">Peso bruto máximo (interno)</span><span class="data-value">3,200 libras (1,451.5 kg)</span></div>
<div class="data-row"><span class="data-label">Peso bruto máximo (externo)</span><span class="data-value">3,350 libras (1,519.6 kg)</span></div>
<div class="data-row"><span class="data-label">CG lateral máximo izquierdo</span><span class="data-value">3.0 pulgadas (76.2 mm)</span></div>
<div class="data-row"><span class="data-label">CG lateral máximo derecho</span><span class="data-value">4.0 pulgadas (101.6 mm)</span></div>
<div class="info-box"><p>El CG se mueve agregando o quitando peso. Siempre verificar el Manual de Peso y Balance específico de la aeronave para los límites exactos del CG y la envolvente de vuelo aprobada.</p></div>`}
],
quiz:[
{q:"¿Cuál es el peso bruto máximo del Bell 206B JetRanger III (operación interna)?",opts:["2,850 libras","3,000 libras","3,200 libras (1,451.5 kg)","3,500 libras"],ans:2},
{q:"¿Cuál es el límite de torque para la operación de despegue?",opts:["85% tiempo ilimitado","100% máximo 5 minutos","95% máximo 10 minutos","110% máximo 2 minutos"],ans:1},

let state = {

  finalAnswers:[], finalReviewed:false, finalQ:0,

function loadState(){
  try{
    const s = localStorage.getItem('bell206_state');
    if(s){const parsed=JSON.parse(s);Object.assign(state,parsed);}
  }catch(e){}
}
function saveState(){
  try{
    const {adminOpen,...toSave}=state;
    localStorage.setItem('bell206_state',JSON.stringify(toSave));
  }catch(e){}
}
loadState();

function getCertBanner(){
  var correct=state.finalAnswers.filter(function(a,i){return a===FINAL_EXAM[i].ans;}).length;
  if(!state.finalReviewed||correct<21) return "";
  var pct=Math.round(correct/30*100);
  var certBtn=state.user
    ?'<button class="btn btn-primary" onclick="downloadCertNow('+correct+','+pct+')" style="font-size:13px;padding:8px 16px">📄 Descargar Certificado PDF</button>'
    :'';
  return '<div style="background:linear-gradient(135deg,#1e3a1e,#0a2a0a);border:1.5px solid var(--green);border-radius:var(--radius2);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">'
    +'<div><div style="font-size:11px;color:var(--green);text-transform:uppercase;letter-spacing:.08em">🏆 Curso Aprobado</div>'
    +'<div style="font-size:14px;font-weight:500;color:#fff;margin-top:2px">'+correct+'/30 ('+pct+'%) — ✅ FASE TEÓRICA COMPLETADA</div></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<button class="btn btn-green" onclick="goFinalResult()" style="font-size:13px;padding:8px 16px">🏆 Ver Resultado</button>'
    +certBtn
    +'</div></div>';
}
function render(){
  const root=document.getElementById('root');
  if(state.view==='intro') root.innerHTML=renderIntro();
  else if(state.view==='register') root.innerHTML=renderRegister();
  else if(state.view==='module') root.innerHTML=renderModule();
  else if(state.view==='moduleExam') root.innerHTML=renderModuleExam();
  else if(state.view==='examResult') root.innerHTML=renderExamResult();
  else if(state.view==='map') root.innerHTML=renderMap();
  else if(state.view==='finalExam') root.innerHTML=renderFinalExam();
  else if(state.view==='finalResult') root.innerHTML=renderFinalResult();
  else if(state.view==='wb_calc') root.innerHTML=renderWBCalc();
  else if(state.view==='perf_calc') root.innerHTML=renderPerfCalc();
  else if(state.view==='hv_calc') root.innerHTML=renderHVCalc();

  saveState();
}

  </div>
  <h3 style="color:var(--amber);margin-bottom:12px">🔑 Clave de Respuestas Correctas</h3>`;
  MODULES.forEach((m,mi)=>{
    html+=`<div style="margin-bottom:12px"><div class="chapter-title">Módulo ${m.id}: ${m.title}</div>`;
    m.quiz.forEach((q,qi)=>{
      html+=`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text3)">M${m.id}.${qi+1}</span>
        <span style="color:var(--text2);margin:0 6px">${q.q.substring(0,60)}...</span>
        <span class="badge badge-green" style="font-size:10px">Resp: ${String.fromCharCode(65+q.ans)}</span>
      </div>`;
    });
    html+='</div>';
  });
  html+='<div class="chapter-title" style="margin-top:12px">Examen Final (30 preguntas)</div>';
  FINAL_EXAM.forEach((q,i)=>{
    html+=`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
      <span style="color:var(--text3)">F${i+1}</span>
      <span style="color:var(--text2);margin:0 6px">${q.q.substring(0,55)}...</span>
      <span class="badge badge-green" style="font-size:10px">Resp: ${String.fromCharCode(65+q.ans)}</span>

  });
  html+=`<button class="btn btn-sm" onclick="downloadAdminKeys()" style="margin-top:14px;width:100%">⬇ Descargar clave completa .txt</button>`;
  return html;
}

function downloadAdminKeys(){
  const lines=[];
  lines.push('CLAVE DE RESPUESTAS — CURSO DE ADAPTACIÓN BELL 206B JETRANGER III');
  lines.push('DOCUMENTO CONFIDENCIAL — SOLO PARA EL ADMINISTRADOR DEL CURSO');
  lines.push('='.repeat(70));
  lines.push('Basado en: Bell 206BIII P/G SPN 10/98');
  lines.push('Referencia regulatoria: ANAC Argentina / RAAC Parte 61 y 91');
  lines.push('');
  MODULES.forEach((m,mi)=>{
    lines.push('');lines.push('='.repeat(70));
    lines.push(`MÓDULO ${m.id}: ${m.title.toUpperCase()}`);lines.push('='.repeat(70));
    m.quiz.forEach((q,qi)=>{
      lines.push(`\nPregunta M${m.id}.${qi+1}: ${q.q}`);
      q.opts.forEach((o,oi)=>lines.push(`  ${String.fromCharCode(65+oi)}. ${o}${oi===q.ans?' ◄ CORRECTA':''}`));
    });
  });
  lines.push('');lines.push('='.repeat(70));
  lines.push('EXAMEN FINAL INTEGRADOR (30 PREGUNTAS)');lines.push('='.repeat(70));
  FINAL_EXAM.forEach((q,i)=>{
    lines.push(`\nPregunta F${i+1}: ${q.q}`);
    q.opts.forEach((o,oi)=>lines.push(`  ${String.fromCharCode(65+oi)}. ${o}${oi===q.ans?' ◄ CORRECTA':''}`));
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='Bell206B3_ClaveAdmin_CONFIDENCIAL.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

async function sendCertificateEmails(doc, safeName, score, pct){
  const statusEl = document.getElementById('email-status-msg');
  if(!statusEl) return;

  if(!EMAIL_CFG.publicKey || !EMAIL_CFG.serviceId || !EMAIL_CFG.templateId){
    // Fallback: open mailto links
    var subj = encodeURIComponent('Aprobaci\u00f3n Curso Bell 206B JetRanger III \u2014 ' + state.user.nombre + ' ' + state.user.apellido);
    var body = encodeURIComponent('Estimado/a ' + state.user.nombre + ' ' + state.user.apellido + ',\n\n'
      + 'Ha completado satisfactoriamente la Fase Te\u00f3rica del Curso de Adaptaci\u00f3n al Bell Model 206B JetRanger III.\n\n'
      + 'Licencia ANAC: ' + state.user.licencia + '\n'
      + 'Resultado Examen Final: ' + score + '/30 (' + pct + '%)\n'
      + 'Fecha: ' + new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}) + '\n\n'
      + 'IMPORTANTE: Por favor adjunte el archivo PDF del certificado que se descarg\u00f3 autom\u00e1ticamente.\n\n'
      + 'Eduardo J. Forgan\n'
      + 'Instructor de Vuelo de Helic\u00f3pteros \u2014 Comandante\n'
      + 'Modena Air Service \u2014 ANAC Argentina');
    // Open email to student
    window.open('mailto:' + state.user.email + '?subject=' + subj + '&body=' + body);
    setTimeout(function(){
      // CC to instructor
      var bodyCC = encodeURIComponent('[COPIA] Cursante: ' + state.user.nombre + ' ' + state.user.apellido + '\nLicencia: ' + state.user.licencia + '\nEmail: ' + state.user.email + '\nResultado: ' + score + '/30 (' + pct + '%)\nFecha: ' + new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'}));
      window.open('mailto:eforgan@gruppomodena.com?subject=[COPIA] ' + subj + '&body=' + bodyCC);
    }, 1000);
    if(statusEl){
      statusEl.className='email-status sending';
      statusEl.innerHTML='\ud83d\udce7 Se abri\u00f3 el cliente de email. <strong>Adjunt\u00e1 el PDF descargado</strong> y hacerle click en Enviar. Para configurar env\u00edo autom\u00e1tico, configure EmailJS en el Panel Admin.';
      statusEl.style.display='block';
    }
    return;
  }

  statusEl.className='email-status sending';
  statusEl.innerHTML='📧 Enviando certificado por email... por favor espere.';
  statusEl.style.display='block';

  const now = new Date();
  const dateStr = now.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  // pdfBase64 generation removed (50KB limit)
  const nombre = `${state.user.nombre} ${state.user.apellido}`;

  // NOTE: PDF adjunto removido (límite 50KB EmailJS free plan)
  // El PDF se descarga automáticamente al dispositivo del cursante
  const templateParams = {
    to_name:    nombre,
    to_email:   state.user.email,
    licencia:   state.user.licencia,
    score:      `${score}/30 (${pct}%)`,
    fecha:      dateStr,
    aeronave:   'Bell Model 206B JetRanger III',
    instructor: 'Eduardo J. Forgan',
    cc_email:   EMAIL_CFG.ccEmail,
  };

  try{
    // Send to student
    await emailjs.send(EMAIL_CFG.serviceId, EMAIL_CFG.templateId, {
      ...templateParams,
      reply_to: EMAIL_CFG.ccEmail,
    });

    // Send copy to instructor
    await emailjs.send(EMAIL_CFG.serviceId, EMAIL_CFG.templateId, {
      ...templateParams,
      to_name:  'Eduardo J. Forgan',
      to_email: EMAIL_CFG.ccEmail,
      reply_to: state.user.email,
      asunto_prefijo: '[COPIA] '
    });

    statusEl.className='email-status sent';
    statusEl.innerHTML=`✅ Email de aprobación enviado a <strong>${state.user.email}</strong> y copia a <strong>${EMAIL_CFG.ccEmail}</strong>. El certificado PDF fue descargado automáticamente a tu dispositivo.`;
  } catch(err){
    console.error('EmailJS error:', err);
    statusEl.className='email-status error';
    statusEl.innerHTML=`❌ Error al enviar email: ${err?.text||JSON.stringify(err)}. El certificado ya fue descargado localmente.`;
  }
}

window.emitManualCert = function(){
  var nom=document.getElementById('mc_nom').value.trim();
  var ape=document.getElementById('mc_ape').value.trim();
  var lic=document.getElementById('mc_lic').value.trim();
  var mail=document.getElementById('mc_mail').value.trim();
  var score=document.getElementById('mc_score').value.trim();
  var fecha=document.getElementById('mc_fecha').value.trim();
  if(!nom||!ape||!lic||!mail){
    document.getElementById('mc_status').innerHTML='<span style="color:var(--red)">Complete todos los campos.</span>';
    return;
  }
  document.getElementById('mc_status').innerHTML='<span style="color:var(--amber)">Generando...</span>';
  // Temporarily set user for cert generation
  var prevUser=state.user;
  state.user={nombre:nom,apellido:ape,licencia:lic,email:mail};
  // Parse score
  var parts=score.match(/(\d+)/);
  var sc=parts?parseInt(parts[1]):30;
  var pct=Math.round(sc/30*100);
  try{
    generateCertificate(sc,pct);
    document.getElementById('mc_status').innerHTML='<span style="color:var(--green)">✅ Certificado generado y email enviado.</span>';
  }catch(e){
    document.getElementById('mc_status').innerHTML='<span style="color:var(--red)">❌ Error: '+e.message+'</span>';
  }
  state.user=prevUser;
};
window.saveEmailConfig = function(){
  const pk  = document.getElementById('ejs-pk').value.trim();
  const svc = document.getElementById('ejs-svc').value.trim();
  const tid = document.getElementById('ejs-tid').value.trim();
  if(!pk||!svc||!tid){
    document.getElementById('email-cfg-status').innerHTML='<span style="color:var(--red)">Por favor complete todos los campos.</span>';
    return;
  }
  localStorage.setItem('ejsPK', pk);
  localStorage.setItem('ejsSVC', svc);
  localStorage.setItem('ejsTID', tid);
  EMAIL_CFG.publicKey  = pk;
  EMAIL_CFG.serviceId  = svc;
  EMAIL_CFG.templateId = tid;
  try{ emailjs.init({publicKey: pk}); }catch(e){}
  document.getElementById('email-cfg-status').innerHTML='<span style="color:var(--green)">✅ Configuración guardada exitosamente.</span>';
};

window.startCourse=()=>{state.view='map';render();}

window.goMap=()=>{state.view='map';render();}
window.goModule=(i)=>{state.currentModule=i;state.currentChapter=0;state.view='module';render();}
window.setChapter=(i)=>{state.currentChapter=i;render();}
window.prevChapter=()=>{if(state.currentChapter>0){state.currentChapter--;render();}}
window.nextChapter=()=>{const m=MODULES[state.currentModule];if(state.currentChapter<m.chapters.length-1){state.currentChapter++;render();}}
window.goExam=()=>{state.examAnswers=[];state.examQ=0;state.examReviewed=false;state.view='moduleExam';render();}
window.backToModule=()=>{state.view='module';render();}
window.setExamQ=(i)=>{state.examQ=i;render();}
window.prevExamQ=()=>{if(state.examQ>0){state.examQ--;render();}}
window.nextExamQ=()=>{const m=MODULES[state.currentModule];if(state.examQ<m.quiz.length-1){state.examQ++;render();}}
window.selectAnswer=(oi)=>{if(!state.examReviewed){state.examAnswers[state.examQ]=oi;render();}}
window.submitExam=()=>{state.examReviewed=true;render();}
window.showExamResult=()=>{
  const m=MODULES[state.currentModule];
  const correct=m.quiz.filter((q,i)=>state.examAnswers[i]===q.ans).length;
  if(correct>=4&&!state.completedModules.includes(state.currentModule)){
    state.completedModules.push(state.currentModule);
    state.moduleScores[state.currentModule]=correct;
  }
  state.view='examResult';render();
}
window.retryExam=()=>{state.examAnswers=[];state.examQ=0;state.examReviewed=false;state.view='moduleExam';render();}
window.nextModule=()=>{
  const next=state.currentModule+1;
  if(next<MODULES.length){state.currentModule=next;state.currentChapter=0;state.examAnswers=[];state.examQ=0;state.examReviewed=false;state.view='module';render();}
  else{state.view='map';render();}
}
window.startFinal=()=>{state.finalAnswers=[];state.finalQ=0;state.finalReviewed=false;state.view='finalExam';render();}
window.setFinalQ=(i)=>{state.finalQ=i;render();}

window.submitFinal=()=>{state.finalReviewed=true;render();}
window.showFinalResult=()=>{state.view='finalResult';render();}
window.retryFinal=()=>{state.finalAnswers=[];state.finalQ=0;state.finalReviewed=false;state.view='finalExam';render();}

window.submitRegister=()=>{

  const ap=document.getElementById('reg-apellido').value.trim();
  const lic=document.getElementById('reg-licencia').value.trim();

<script>
// =========================================================
// CALCULADORAS DE VUELO — Bell 206B JetRanger III
// =========================================================
const WB_STATIONS=[
  {id:'empty',name:'Peso Vac\xedo Promedio',arm:116.5,w:1604,fixed:true},
  {id:'oil',name:'Aceite (motor/transmisi\xf3n)',arm:179.0,w:12,fixed:true},
  {id:'pilot',name:'Piloto (asiento derecho)',arm:65.0,w:0},
  {id:'coplt',name:'Copiloto (asiento izquierdo)',arm:65.0,w:0},
  {id:'pax1',name:'Pasajero trasero #1',arm:104.0,w:0},
  {id:'pax2',name:'Pasajero trasero #2',arm:104.0,w:0},
  {id:'pax3',name:'Pasajero trasero #3',arm:104.0,w:0},
  {id:'bag',name:'Equipaje (m\xe1x. 250 lb / 113 kg)',arm:148.0,w:0,mx:250},
  {id:'fuel',name:'Combustible Jet A @6.7 lb/gal',arm:110.7,w:0,mx:610}
];
const CG_FWD=[[1604,98],[2000,100],[2500,102],[3000,104],[3200,105]];
const CG_AFT=113.0, GW_MAX=3200, GW_MIN=1604;
function getFwdLim(gw){
  if(gw<=CG_FWD[0][0])return CG_FWD[0][1];
  if(gw>=CG_FWD[CG_FWD.length-1][0])return CG_FWD[CG_FWD.length-1][1];
  for(var i=1;i<CG_FWD.length;i++){
    if(gw<=CG_FWD[i][0]){var t=(gw-CG_FWD[i-1][0])/(CG_FWD[i][0]-CG_FWD[i-1][0]);return CG_FWD[i-1][1]+t*(CG_FWD[i][1]-CG_FWD[i-1][1]);}
  }
  return 105;
}
function renderWBCalc(){
  var rows=WB_STATIONS.map(function(s){
    var inp=s.fixed?'<span style="color:var(--amber2);font-weight:500">'+s.w+'</span>':'<input type="number" id="wb_'+s.id+'" value="'+s.w+'" min="0"'+(s.mx?' max="'+s.mx+'"':'')+' style="width:76px;padding:5px 6px;margin:0;font-size:13px" oninput="calcWB()">';
    return '<tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 8px;font-size:13px;color:var(--text2)">'+s.name+'</td><td style="padding:6px;font-size:12px;color:var(--text3);text-align:center">'+s.arm.toFixed(1)+'"</td><td style="padding:4px 6px;text-align:center">'+inp+'</td><td id="wb_m_'+s.id+'" style="padding:6px;font-size:12px;text-align:right;color:var(--text3)">'+(s.w*s.arm).toFixed(0)+'</td></tr>';
  }).join('');
  return '<div class="flex-between" style="margin-bottom:14px"><button class="btn btn-sm" onclick="goMap()">← Volver</button><span class="badge badge-amber">\u2696\ufe0f Peso y Balanceo</span></div>'
  +'<div class="card" style="margin-bottom:10px;overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead><tr style="border-bottom:2px solid var(--border2)"><th style="padding:6px 8px;font-size:11px;color:var(--text3);text-align:left;font-weight:500">\xccdTEM</th><th style="padding:6px;font-size:11px;color:var(--text3);text-align:center;font-weight:500">BRAZO (in)</th><th style="padding:6px;font-size:11px;color:var(--text3);text-align:center;font-weight:500">PESO (lb)</th><th style="padding:6px;font-size:11px;color:var(--text3);text-align:right;font-weight:500">MOMENTO</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr style="border-top:2px solid var(--border2);background:var(--bg3)"><td colspan="2" style="padding:8px;font-size:13px;font-weight:500">TOTALES</td><td id="wb_tw" style="padding:8px;font-size:14px;font-weight:500;text-align:center;color:var(--amber2)">\u2014</td><td id="wb_tm" style="padding:8px;font-size:14px;font-weight:500;text-align:right;color:var(--amber2)">\u2014</td></tr></tfoot></table></div>'
  +'<div id="wb_res" class="card" style="margin-bottom:10px"><p style="color:var(--text3)">Ingrese los pesos para calcular</p></div>'
  +'<canvas id="wb_cv" width="560" height="310" style="width:100%;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border)"></canvas>'
  +'<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">Envolvente aproximada \u2014 Verificar siempre con el Manual de Vuelo y el Formulario de Peso y Balance de la aeronave espec\xedfica</p>';
}
window.calcWB=function(){
  var tw=0,tm=0;
  WB_STATIONS.forEach(function(s){
    var el=document.getElementById('wb_'+s.id);
    var w=s.fixed?s.w:(el?parseFloat(el.value)||0:0);
    var mo=w*s.arm; tw+=w; tm+=mo;
    var mel=document.getElementById('wb_m_'+s.id);
    if(mel)mel.textContent=mo.toFixed(0);
  });
  var wEl=document.getElementById('wb_tw'),mEl=document.getElementById('wb_tm');
  if(wEl)wEl.textContent=tw.toFixed(0)+' lb';
  if(mEl)mEl.textContent=tm.toFixed(0);
  var cg=tw>0?tm/tw:0;
  var fl=getFwdLim(tw);
  var ok=tw<=GW_MAX&&tw>=GW_MIN&&cg>=fl&&cg<=CG_AFT;
  var over=tw>GW_MAX;
  var kg=(tw*0.4536).toFixed(0);
  var cgM=(cg*0.0254).toFixed(3);
  var status=over?'\u274c EXCEDE PESO M\xc1XIMO':!ok?'\u274c CG FUERA DE L\xceMITES':'\u2705 DENTRO DE L\xceMITES';
  var col=ok&&!over?'var(--green)':'var(--red)';
  var r=document.getElementById('wb_res');
  if(r)r.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><div style="font-size:11px;color:var(--text3);text-transform:uppercase">Peso Bruto</div><div style="font-size:22px;font-weight:500;color:var(--amber2)">'+tw.toFixed(0)+'<span style="font-size:12px"> lb</span></div><div style="font-size:12px;color:var(--text3)">('+kg+' kg)</div></div><div><div style="font-size:11px;color:var(--text3);text-transform:uppercase">CG Calculado</div><div style="font-size:22px;font-weight:500;color:var(--amber2)">'+cg.toFixed(2)+'<span style="font-size:12px"> in</span></div><div style="font-size:12px;color:var(--text3)">('+cgM+' m)</div></div><div><div style="font-size:11px;color:var(--text3);text-transform:uppercase">Estado</div><div style="font-size:15px;font-weight:500;color:'+col+';margin-top:4px">'+status+'</div><div style="font-size:12px;color:var(--text3)">L\xedm: '+fl.toFixed(1)+'" \u2014 '+CG_AFT+'"</div></div></div>';
  setTimeout(function(){drawWBCanvas(tw,cg);},10);
};
function drawWBCanvas(gw,cg){
  var c=document.getElementById('wb_cv');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var pl=60,pr=20,pt=28,pb=48,cW=W-pl-pr,cH=H-pt-pb;
  var cMin=96,cMax=116,gMin=1300,gMax=3400;
  var tx=function(v){return pl+(v-cMin)/(cMax-cMin)*cW;};
  var ty=function(v){return pt+(1-(v-gMin)/(gMax-gMin))*cH;};
  ctx.fillStyle='#161b24';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(100,120,150,0.2)';ctx.lineWidth=0.5;
  for(var gc=97;gc<=115;gc+=2){ctx.beginPath();ctx.moveTo(tx(gc),pt);ctx.lineTo(tx(gc),pt+cH);ctx.stroke();}
  for(var gr=1400;gr<=3400;gr+=200){ctx.beginPath();ctx.moveTo(pl,ty(gr));ctx.lineTo(pl+cW,ty(gr));ctx.stroke();}
  // Envelope fill
  ctx.beginPath();ctx.moveTo(tx(getFwdLim(GW_MIN)),ty(GW_MIN));
  for(var w=GW_MIN;w<=GW_MAX;w+=25)ctx.lineTo(tx(getFwdLim(w)),ty(w));
  ctx.lineTo(tx(CG_AFT),ty(GW_MAX));ctx.lineTo(tx(CG_AFT),ty(GW_MIN));ctx.closePath();
  ctx.fillStyle='rgba(46,204,113,0.1)';ctx.fill();
  ctx.strokeStyle='rgba(46,204,113,0.55)';ctx.lineWidth=2;ctx.stroke();
  // Max GW line
  ctx.strokeStyle='rgba(232,160,32,0.4)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pl,ty(GW_MAX));ctx.lineTo(pl+cW,ty(GW_MAX));ctx.stroke();ctx.setLineDash([]);
  // Axes
  ctx.strokeStyle='rgba(150,170,200,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pl,pt);ctx.lineTo(pl,pt+cH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pl,pt+cH);ctx.lineTo(pl+cW,pt+cH);ctx.stroke();
  // Labels
  ctx.fillStyle='rgba(130,150,180,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(var gc2=98;gc2<=114;gc2+=2)ctx.fillText(gc2,tx(gc2),pt+cH+14);
  ctx.textAlign='right';
  for(var gr2=1400;gr2<=3200;gr2+=200)ctx.fillText(gr2,pl-4,ty(gr2)+3);
  ctx.fillStyle='rgba(170,185,210,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('CG (pulgadas desde datum / nariz)',pl+cW/2,H-6);
  ctx.save();ctx.translate(13,pt+cH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Peso Bruto (lb)',0,0);ctx.restore();
  ctx.fillStyle='rgba(232,160,32,0.6)';ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillText('M\xe1x '+GW_MAX+' lb',pl+3,ty(GW_MAX)-4);
  // Point
  if(gw>=GW_MIN&&cg>90&&cg<120){
    var px=tx(cg),py=ty(gw),inOk=gw<=GW_MAX&&gw>=GW_MIN&&cg>=getFwdLim(gw)&&cg<=CG_AFT;
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(px,pt);ctx.lineTo(px,pt+cH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pl,py);ctx.lineTo(pl+cW,py);ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();ctx.arc(px,py,9,0,Math.PI*2);
    ctx.fillStyle=inOk?'rgba(46,204,113,0.9)':'rgba(231,76,60,0.9)';ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='white';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
    var lx=px+12,ly=py-5;if(lx+55>W-pr)lx=px-65;
    ctx.fillText(gw.toFixed(0)+' lb',lx,ly);ctx.fillText(cg.toFixed(2)+'"',lx,ly+13);
  }
}

function getISA(pa){return 15-0.00198*pa;}
function calcPV(pa,oat,gw,ai){
  var isa=getISA(pa),dT=oat-isa;
  var rc=Math.max(0,2400-0.1*pa-0.5*dT-0.3*(gw-2000));
  if(ai)rc=Math.max(0,rc-240);
  var da=pa+118.8*dT;
  var ic=Math.min(3200,Math.max(0,3200-8*(da/1000)-8*dT-(ai?220:0)));
  var iw=Math.min(3200,Math.max(0,ic*0.927));
  var oc=Math.min(3200,Math.max(0,2900-14*(da/1000)-12*dT-(ai?295:0)));
  var ow=Math.min(3200,Math.max(0,oc*0.908));
  return{rc:rc,da:da,ic:ic,iw:iw,oc:oc,ow:ow,isa:isa,dT:dT};
}
function renderPerfCalc(){
  return '<div class="flex-between" style="margin-bottom:14px"><button class="btn btn-sm" onclick="goMap()">← Volver</button><span class="badge badge-amber">\ud83d\udcca Performance</span></div>'
  +'<div class="card" style="margin-bottom:10px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
  +'<div><label>Presi\xf3n Altitud (pies)</label><input type="number" id="pf_pa" value="5000" min="0" max="20000" step="500" oninput="calcPerf()"></div>'
  +'<div><label>OAT — Temperatura (°C)</label><input type="number" id="pf_oat" value="15" min="-50" max="55" oninput="calcPerf()"></div>'
  +'<div><label>Peso Bruto (lb) — M\xe1x. 3,200</label><input type="number" id="pf_gw" value="2800" min="1604" max="3200" step="50" oninput="calcPerf()"></div>'
  +'<div><label>Anti-hielo</label><select id="pf_ai" onchange="calcPerf()" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--radius);padding:10px;color:var(--text);width:100%;font-size:14px"><option value="0">OFF</option><option value="1">ON</option></select></div>'
  +'</div></div>'
  +'<div id="pf_res" class="card" style="margin-bottom:10px"><p style="color:var(--text3)">Complete los datos</p></div>'
  +'<canvas id="pf_rc" width="560" height="240" style="width:100%;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border);margin-bottom:8px"></canvas>'
  +'<canvas id="pf_hv" width="560" height="180" style="width:100%;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border)"></canvas>'
  +'<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">Datos aproximados basados en Figuras 12-1, 12-2, 12-4, 12-5 — Bell 206BIII P/G SPN 10/98. Verificar siempre con el Manual de Vuelo.</p>';
}
window.calcPerf=function(){
  var pa=parseFloat(document.getElementById('pf_pa').value)||0;
  var oat=parseFloat(document.getElementById('pf_oat').value)||15;
  var gw=parseFloat(document.getElementById('pf_gw').value)||2800;
  var ai=parseInt(document.getElementById('pf_ai').value)||0;
  var p=calcPV(pa,oat,gw,ai===1);
  var ci=gw<=p.ic,co=gw<=p.oc;
  var r=document.getElementById('pf_res');
  if(r)r.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">'
    +'<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Raz\xf3n Ascenso</div><div style="font-size:22px;font-weight:500;color:var(--amber2)">'+p.rc.toFixed(0)+'</div><div style="font-size:11px;color:var(--text3)">ft/min ('+((p.rc*0.00508).toFixed(2))+' m/s)</div></div>'
    +'<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Alt. Densidad</div><div style="font-size:22px;font-weight:500;color:var(--amber2)">'+p.da.toFixed(0)+'</div><div style="font-size:11px;color:var(--text3)">ft ('+((p.da*0.3048).toFixed(0))+' m)</div></div>'
    +'<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Techo VS IGE</div><div style="font-size:20px;font-weight:500;color:'+(ci?'var(--green)':'var(--red)')+'">'+p.ic.toFixed(0)+'</div><div style="font-size:11px;color:var(--text3)">lb calm \u2014 '+(ci?'\u2705 OK':'\u274c NO')+'</div></div>'
    +'<div><div style="font-size:10px;color:var(--text3);text-transform:uppercase">Techo VS OGE</div><div style="font-size:20px;font-weight:500;color:'+(co?'var(--green)':'var(--red)')+'">'+p.oc.toFixed(0)+'</div><div style="font-size:11px;color:var(--text3)">lb calm \u2014 '+(co?'\u2705 OK':'\u274c NO')+'</div></div>'
    +'</div>';
  setTimeout(function(){drawRCCanvas(pa,oat,gw,ai===1,p);drawHovCanvas(gw,p);},10);
};
function drawRCCanvas(pa,oat,gw,ai,p){
  var c=document.getElementById('pf_rc');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var pl=58,pr=20,pt=28,pb=44,cW=W-pl-pr,cH=H-pt-pb;
  ctx.fillStyle='#161b24';ctx.fillRect(0,0,W,H);
  var aMax=20000,rMax=2800;
  var tx=function(a){return pl+a/aMax*cW;};var ty=function(r){return pt+(1-r/rMax)*cH;};
  ctx.strokeStyle='rgba(100,120,150,0.2)';ctx.lineWidth=0.5;
  for(var a=0;a<=20000;a+=2000){ctx.beginPath();ctx.moveTo(tx(a),pt);ctx.lineTo(tx(a),pt+cH);ctx.stroke();}
  for(var r=0;r<=2800;r+=400){ctx.beginPath();ctx.moveTo(pl,ty(r));ctx.lineTo(pl+cW,ty(r));ctx.stroke();}
  var weights=[2000,2400,2800,3200];
  var colors=['rgba(46,204,113,0.8)','rgba(52,152,219,0.8)','rgba(232,160,32,0.9)','rgba(231,76,60,0.8)'];
  weights.forEach(function(w,i){
    ctx.strokeStyle=colors[i];ctx.lineWidth=w===gw?3:1.5;ctx.beginPath();var first=true;
    for(var alt=0;alt<=20000;alt+=500){var rc=calcPV(alt,oat,w,ai).rc;if(first){ctx.moveTo(tx(alt),ty(rc));first=false;}else ctx.lineTo(tx(alt),ty(rc));}
    ctx.stroke();
    var re=calcPV(19500,oat,w,ai).rc;if(re>0){ctx.fillStyle=colors[i];ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText(w+' lb',tx(19500)-5,ty(re)-4);}
  });
  ctx.beginPath();ctx.arc(tx(pa),ty(p.rc),7,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.strokeStyle='rgba(232,160,32,0.9)';ctx.lineWidth=2;ctx.stroke();
  ctx.strokeStyle='rgba(150,170,200,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pl,pt);ctx.lineTo(pl,pt+cH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pl,pt+cH);ctx.lineTo(pl+cW,pt+cH);ctx.stroke();
  ctx.fillStyle='rgba(130,150,180,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  for(var a2=0;a2<=20000;a2+=4000)ctx.fillText(a2/1000+'k',tx(a2),pt+cH+14);
  ctx.textAlign='right';
  for(var r2=0;r2<=2800;r2+=400)ctx.fillText(r2,pl-4,ty(r2)+3);
  ctx.fillStyle='rgba(170,185,210,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('Presi\xf3n Altitud (miles de pies)',pl+cW/2,H-6);
  ctx.save();ctx.translate(13,pt+cH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Raz\xf3n Ascenso (ft/min)',0,0);ctx.restore();
  ctx.fillStyle='rgba(232,160,32,0.7)';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText('R\xe9gimen de Ascenso — OAT='+oat+'\xb0C Anti-hielo '+(ai?'ON':'OFF'),pl+cW/2,pt-10);
}
function drawHovCanvas(gw,p){
  var c=document.getElementById('pf_hv');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var pl=90,pr=20,pt=30,pb=35,cW=W-pl-pr,cH=H-pt-pb;
  ctx.fillStyle='#161b24';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(170,185,210,0.7)';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText('Techo de Vuelo Estacionario — M\xe1ximo Peso Bruto Permisible (lb)',pl+cW/2,pt-10);
  var bars=[
    {lbl:'IGE Calmado',v:p.ic,col:'rgba(46,204,113,0.8)',ok:gw<=p.ic},
    {lbl:'IGE Viento',v:p.iw,col:'rgba(52,152,219,0.8)',ok:gw<=p.iw},
    {lbl:'OGE Calmado',v:p.oc,col:'rgba(232,160,32,0.8)',ok:gw<=p.oc},
    {lbl:'OGE Viento',v:p.ow,col:'rgba(231,76,60,0.75)',ok:gw<=p.ow}
  ];
  var bH=cH/bars.length-5;
  bars.forEach(function(b,i){
    var y=pt+i*(bH+5);
    var bW=Math.min(cW,b.v/3200*cW);var gwW=Math.min(cW,gw/3200*cW);
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(pl,y,cW,bH);
    ctx.fillStyle=b.col;ctx.fillRect(pl,y,bW,bH);

    ctx.fillText(b.lbl,pl-5,y+bH/2+4);
    ctx.fillStyle=b.ok?'rgba(46,204,113,0.9)':'rgba(231,76,60,0.9)';
    ctx.font='bold 10px sans-serif';ctx.textAlign='left';
    ctx.fillText(b.v.toFixed(0)+' lb '+(b.ok?'\u2713':'\u2717'),pl+bW+4,y+bH/2+4);
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=2;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pl+gwW,y);ctx.lineTo(pl+gwW,y+bH);ctx.stroke();ctx.setLineDash([]);
  });
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='10px sans-serif';ctx.textAlign='center';
  var gwW=Math.min(cW,gw/3200*cW);
  ctx.fillText('PB: '+gw+' lb',pl+gwW,H-3);
  ctx.fillStyle='rgba(130,150,180,0.6)';ctx.font='9px sans-serif';ctx.textAlign='center';
  [1000,1500,2000,2500,3000,3200].forEach(function(v){ctx.fillText(v,pl+v/3200*cW,pt+cH+14);});
}

// H-V DIAGRAM
var HV_UP=[[0,350],[5,350],[10,345],[15,338],[20,320],[25,298],[30,268],[35,228],[40,186],[45,144],[50,108],[52,100]];
function isAvoid(spd,ht){
  if(ht>=100&&ht<=400){
    for(var i=1;i<HV_UP.length;i++){if(spd<=HV_UP[i][0]){var t=(spd-HV_UP[i-1][0])/(HV_UP[i][0]-HV_UP[i-1][0]);var hb=HV_UP[i-1][1]+t*(HV_UP[i][1]-HV_UP[i-1][1]);if(ht<=hb)return true;break;}}
  }
  if(ht<=20&&spd>=17&&spd<=65)return true;
  return false;
}
function renderHVCalc(){
  return '<div class="flex-between" style="margin-bottom:14px"><button class="btn btn-sm" onclick="goMap()">← Volver</button><span class="badge badge-amber">\ud83d\udcc8 Diagrama H-V</span></div>'
  +'<h3 style="margin-bottom:6px">Diagrama Altura-Velocidad (H-V)</h3>'
  +'<p style="font-size:13px;margin-bottom:10px">Define las condiciones desde las cuales se puede realizar un aterrizaje seguro en superficie plana y firme tras falla del motor. <strong style="color:var(--red)">EVITAR OPERAR EN LA ZONA SOMBREADA.</strong></p>'
  +'<div class="card" style="margin-bottom:10px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
  +'<div><label>Velocidad A\xe9rea (KIAS)</label><input type="number" id="hv_s" value="60" min="0" max="130" step="1" oninput="updHV()"></div>'
  +'<div><label>Altura sobre terreno (ft AGL)</label><input type="number" id="hv_h" value="500" min="0" max="500" step="10" oninput="updHV()"></div>'
  +'</div><div id="hv_st" style="margin-top:10px;padding:10px;border-radius:var(--radius);background:var(--bg3);text-align:center;font-size:14px;font-weight:500">Ingrese datos de vuelo</div></div>'
  +'<canvas id="hv_cv" width="560" height="400" style="width:100%;border-radius:var(--radius);background:var(--bg2);border:1px solid var(--border)"></canvas>'
  +'<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:4px">Figura 12-6 Bell 206B JetRanger III \u2014 Superficies lisas, niveladas y firmes \u2014 No exceder l\xedmites de altitud vs. peso bruto</p>';
}
window.updHV=function(){
  var spd=parseFloat(document.getElementById('hv_s').value)||0;
  var ht=parseFloat(document.getElementById('hv_h').value)||0;
  var avoid=isAvoid(spd,ht);
  var st=document.getElementById('hv_st');
  if(st){st.textContent=avoid?'\u274c ZONA A EVITAR \u2014 Aterrizaje seguro NO garantizado':'\u2705 ZONA SEGURA \u2014 Aterrizaje de emergencia factible';st.style.color=avoid?'var(--red)':'var(--green)';st.style.background=avoid?'rgba(231,76,60,0.15)':'rgba(46,204,113,0.1)';}
  setTimeout(function(){drawHV(spd,ht);},10);
};
function drawHV(spd,ht){
  var c=document.getElementById('hv_cv');if(!c)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  var dv=W*0.52;
  // Large scale panel (left): 100-400 ft
  var L={l:55,r:8,t:38,b:46};var LcW=dv-L.l-L.r,LcH=H-L.t-L.b;
  var LsMax=65,LhMin=100,LhMax=400;
  var txL=function(s){return L.l+s/LsMax*LcW;};var tyL=function(h){return L.t+(1-(h-LhMin)/(LhMax-LhMin))*LcH;};
  // Small scale panel (right): 0-100 ft
  var R={l:8,r:18,t:38,b:46};var RcW=W-dv-R.l-R.r,RcH=H-R.t-R.b;
  var RsMax=65,RhMax=100;
  var txR=function(s){return dv+R.l+s/RsMax*RcW;};var tyR=function(h){return R.t+(1-h/RhMax)*RcH;};

  ctx.fillStyle='#161b24';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(80,100,130,0.4)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(dv,0);ctx.lineTo(dv,H);ctx.stroke();ctx.setLineDash([]);

  // Grid L
  ctx.strokeStyle='rgba(100,120,150,0.18)';ctx.lineWidth=0.5;
  [0,10,20,30,40,52,60].forEach(function(s){ctx.beginPath();ctx.moveTo(txL(s),L.t);ctx.lineTo(txL(s),L.t+LcH);ctx.stroke();});
  [100,150,200,250,300,350,400].forEach(function(h){ctx.beginPath();ctx.moveTo(L.l,tyL(h));ctx.lineTo(L.l+LcW,tyL(h));ctx.stroke();});
  // Grid R
  [0,10,20,30,40,52,60].forEach(function(s){ctx.beginPath();ctx.moveTo(txR(s),R.t);ctx.lineTo(txR(s),R.t+RcH);ctx.stroke();});
  [0,20,40,60,80,100].forEach(function(h){ctx.beginPath();ctx.moveTo(dv+R.l,tyR(h));ctx.lineTo(dv+R.l+RcW,tyR(h));ctx.stroke();});

  // Avoid zone LARGE
  ctx.beginPath();ctx.moveTo(txL(0),tyL(LhMax));
  HV_UP.forEach(function(pt){ctx.lineTo(txL(pt[0]),tyL(Math.min(LhMax,Math.max(LhMin,pt[1]))));});
  ctx.lineTo(txL(0),tyL(LhMin));ctx.closePath();
  ctx.fillStyle='rgba(231,76,60,0.22)';ctx.fill();
  ctx.strokeStyle='rgba(231,76,60,0.65)';ctx.lineWidth=2;ctx.beginPath();
  var fst=true;HV_UP.forEach(function(pt){var h=Math.min(LhMax,Math.max(LhMin,pt[1]));if(fst){ctx.moveTo(txL(pt[0]),tyL(h));fst=false;}else ctx.lineTo(txL(pt[0]),tyL(h));});ctx.stroke();
  ctx.fillStyle='rgba(231,76,60,0.65)';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('ZONA A EVITAR',txL(22),tyL(300));
  ctx.fillStyle='rgba(46,204,113,0.55)';ctx.fillText('SEGURO',txL(50),tyL(150));

  // Avoid zone SMALL (upper + lower)
  // Upper part (from HV curve, below 100ft)
  ctx.beginPath();ctx.moveTo(txR(0),tyR(RhMax));
  HV_UP.forEach(function(pt){if(pt[1]<=RhMax)ctx.lineTo(txR(pt[0]),tyR(pt[1]));});
  ctx.lineTo(txR(0),tyR(0));ctx.closePath();
  ctx.fillStyle='rgba(231,76,60,0.22)';ctx.fill();
  // Lower rectangle
  ctx.beginPath();ctx.moveTo(txR(17),tyR(0));ctx.lineTo(txR(17),tyR(20));ctx.lineTo(txR(65),tyR(20));ctx.lineTo(txR(65),tyR(0));ctx.closePath();
  ctx.fillStyle='rgba(231,76,60,0.22)';ctx.fill();ctx.strokeStyle='rgba(231,76,60,0.65)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='rgba(46,204,113,0.55)';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('SEGURO',txR(50),tyR(60));

  // Axes
  ctx.strokeStyle='rgba(150,170,200,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(L.l,L.t);ctx.lineTo(L.l,L.t+LcH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(L.l,L.t+LcH);ctx.lineTo(L.l+LcW,L.t+LcH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dv+R.l,R.t);ctx.lineTo(dv+R.l,R.t+RcH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(dv+R.l,R.t+RcH);ctx.lineTo(dv+R.l+RcW,R.t+RcH);ctx.stroke();

  // Labels L
  ctx.fillStyle='rgba(130,150,180,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  [0,10,20,30,40,52,60].forEach(function(s){ctx.fillText(s,txL(s),L.t+LcH+14);});
  ctx.textAlign='right';
  [100,150,200,250,300,350,400].forEach(function(h){ctx.fillText(h,L.l-4,tyL(h)+3);});
  ctx.fillStyle='rgba(170,185,210,0.75)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('ESCALA GRANDE \u2014 100-400 ft',L.l+LcW/2,18);
  ctx.fillText('Velocidad A\xe9rea Indicada (KIAS)',L.l+LcW/2,H-6);
  ctx.save();ctx.translate(13,L.t+LcH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Altura sobre terreno (ft AGL)',0,0);ctx.restore();

  // Labels R
  ctx.fillStyle='rgba(130,150,180,0.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  [0,20,40,52,60].forEach(function(s){ctx.fillText(s,txR(s),R.t+RcH+14);});
  ctx.textAlign='left';
  [0,20,40,60,80,100].forEach(function(h){ctx.fillText(h,dv+R.l+3,tyR(h)+3);});
  ctx.fillStyle='rgba(170,185,210,0.75)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('ESCALA PEQUE\xd1A \u2014 0-100 ft',dv+R.l+RcW/2,18);
  ctx.fillText('KIAS',dv+R.l+RcW/2,H-6);

  // Current point
  function plotPt(px,py,danger){
    ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fillStyle=danger?'rgba(231,76,60,0.9)':'rgba(46,204,113,0.9)';ctx.fill();
    ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='white';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
    ctx.fillText(spd+' kt',px+10,py-3);ctx.fillText(ht+' ft',px+10,py+9);
  }
  var av=isAvoid(spd,ht);
  if(ht>=LhMin&&ht<=LhMax)plotPt(txL(Math.min(LsMax,spd)),tyL(ht),av);
  if(ht>=0&&ht<=RhMax)plotPt(txR(Math.min(RsMax,spd)),tyR(ht),av);
}

window.goFinalResult=function(){state.view='finalResult';render();};
window.downloadCertNow=function(score,pct){
  if(!state.user){alert('Debés estar registrado para descargar el certificado.');return;}
  generateCertificate(score,pct);
};
window.goWB=function(){state.view='wb_calc';render();setTimeout(function(){window.calcWB();},50);};
window.goPerf=function(){state.view='perf_calc';render();setTimeout(function(){window.calcPerf();},50);};
window.goHV=function(){state.view='hv_calc';render();setTimeout(function(){window.updHV();},50);};

</script>
